name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run i18n-fixer to find UI strings
        run: |
          npm install -g i18n-fixer
          i18n-fixer -f prompt --output i18n_report.txt
        continue-on-error: true

      - name: Upload i18n scan report
        uses: actions/upload-artifact@v4
        with:
          name: i18n-report
          path: i18n_report.txt

      # NEW: Install translation package
      - name: Install translation dependencies
        run: npm install @vitalets/google-translate-api

      # NEW: Translate strings in place
      - name: Translate hardcoded strings
        run: node translate_hardcoded.js

      # NEW: See what changed (optional)
      - name: Show changes
        run: git diff --stat

      # Rest of your build steps unchanged...
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          channel: 'stable'
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test || true

      - name: Setup Android project
        run: |
          rm -rf android
          flutter create --platforms=android .

      - name: Build APK (debug)
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: memora-debug-apk
          path: build/app/outputs/flutter-apk/*.apk
